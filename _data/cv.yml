    Experience:
      - company: Alibaba Group (Tongyi Qwen)
        position: Research Intern, RAG Algorithm
        location: China
        start_date: 2026-06
        end_date: 2026-09
        summary: Listwise reranking for the retrieval-augmented generation (RAG) pipeline of Tongyi Qwen.
        highlights:
          - "Designed a listwise reranking module for the RAG pipeline (RATS) of Tongyi Qwen."
          - "Optimized query understanding and rewriting, improving query-level relevance metrics by up to 4.88%."

      - company: Kuaishou Technology
        position: Research Intern, LLM Search Algorithm
        location: Beijing, China
        start_date: 2025-10
        end_date: 2026-04
        summary: Listwise/pointwise modeling and evaluation for LLM-based search.
        highlights:
          - "Built listwise and pointwise modeling and evaluation pipelines for LLM-based search relevance."
          - "Fine-tuned Qwen3-VL with ASR/OCR signals via SFT and CoT; reached 84.5% pairwise reward-model accuracy."
          - "Applied GRPO/PPO to train the LLM reward model; online A/B testing improved key metrics by 5.12%."

    Publications:
      - title: "LENS: Leveraging Explainable Skills for Listwise Evaluation in Kuaishou Search"
        authors:
          - Zhongxin Huang
        publisher: "CIKM 2026 (CCF-B)"
        releaseDate: 2026
        url: ""
        summary: "A CoT-based listwise evaluation framework with SFT and DAPO-based training for search quality assessment; achieved about 84.2% spot-check accuracy."

      - title: "SPDTM: A Shapley-value Based Preference Discovery and Task Matching to Maximize Satisfaction"
        authors:
          - Zhongxin Huang
        publisher: "Computer Networks 2025 (CCF-B)"
        releaseDate: 2025
        url: ""
        summary: "A Shapley-value based preference discovery and task matching method using MADDPG and multi-armed bandit, reaching about 94.79% and 91.77% on key metrics."

    Awards:
