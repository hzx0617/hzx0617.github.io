    Experience:
      - company: Alibaba Group (Qwen Business Unit)
        position: RAG Retrieval Algorithm Intern
        location: Beijing, China
        start_date: 2026-06
        end_date: 2026-09
        summary: Iteratively optimized the foreign-language retrieval RAG system of Tongyi Qwen, tackling the insufficient authority of Chinese knowledge bases and the reliance on foreign-language sources in professional scenarios.
        highlights:
          - "Rebuilt the retrieval architecture to merge foreign-language general and time-sensitive (TS) indexes into the main recall-and-ranking pipeline, replacing the standalone vertical-search solution and reusing RAG authority and freshness ranking strategies."
          - "Built an offline index-construction plus online intelligent-retrieval dual-stack system: offline crawling, filtering, translation, and vector/feature indexing of authoritative overseas sites; online recognition of query foreign-language intent with unified multi-index ranking."
          - "Validated gains via full evaluation: for targeted foreign-language queries, average score +0.18, high-quality rate +4.88%, availability +6%; for random queries, high-quality rate +14%, availability +2%, core information gain +4.3%."
          - "Drove the optimization roadmap on resource bottlenecks, coverage, and pipeline cost: authoritative-site collection, native foreign-language ranking, and decoupling the pipeline from translation services."

      - company: Kuaishou Technology (Search Technology Dept., General Search Center)
        position: LLM Search Algorithm Intern
        location: Beijing, China
        start_date: 2025-10
        end_date: 2026-04
        summary: Explored a "real user satisfaction"-driven optimization path for Kuaishou's main search entry, addressing over-reliance on click/dwell signals and poor long-tail query experience.
        highlights:
          - "Led a multimodal LLM (Qwen3-VL) based whole-page quality evaluation system: leveraging ASR, OCR, key frames, and covers, generating CoT quality analysis via SFT and fine-tuning the reward model with pairwise preference data, reaching 84.5% pairwise accuracy on the human-annotated set."
          - "Designed and deployed a two-stage GRPO training framework: introducing an LLM RM as the second-stage non-personalized reward on top of a PPO multi-objective model, optimizing policy on 7-day PV<70 long-tail traffic (15.4% of total)."
          - "Online A/B test (5.12% traffic, 6 days) delivered significant gains: passive-search active query-reformulation rate -0.669% (p<0.05), low/no-relevant-result PV share -0.651%, long-play PV share +0.188%; the project was fully launched."

    Publications:
      - title: "LENS: Leveraging Explainable Skills for Listwise Evaluation in Kuaishou Search"
        authors:
          - "Zhongxin Huang (co-first author)"
          - "et al."
        publisher: "CIKM 2026 (CCF-B, under review)"
        releaseDate: 2026
        url: ""
        summary: "A skill-based whole-page search quality evaluation framework enabling automated GSB evaluation and bad-case attribution. Built a two-stage SFT + DAPO-based training scheme whose offline classification accuracy and attribution recall clearly surpass mainstream LLM baselines; online human spot-check consistency reached 84.2%, with evaluation efficiency 40.6x over manual on L20 machines. Work done during the Kuaishou internship."

      - title: "SPDTM: A Shapley-value Based Preference Discovery and Task Matching to Maximize Satisfaction in Mobile Crowd Sensing"
        authors:
          - "Z. Huang (first author)"
          - "Z. Sun"
          - "W. Tan"
          - "H. Song"
          - "T. Wang"
          - "S. Zhang"
          - "A. Liu"
        publisher: "Computer Networks, Vol. 271, 111602 (CCF-B)"
        releaseDate: 2025-10
        url: "https://doi.org/10.1016/j.comnet.2025.111602"
        summary: "A Shapley-value based reinforcement learning framework for preference discovery and task matching in Mobile Crowd Sensing (MCS), addressing low task-worker matching efficiency and false preference reporting. Uses a three-stage design with MADDPG and multi-armed bandit; on real datasets, user preference recognition reached 94.79% and task completion rate 91.77%, outperforming baselines. ISSN 1389-1286."

